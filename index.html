<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Bunny</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffd6e7, #ffb3d9);
            overflow: hidden;
            font-family: 'Pacifico', cursive;
        }

        .heart-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart-shape {
            position: absolute;
            width: 200px;
            height: 200px;
            background: #fff0f6;
            transform: rotate(-45deg);
            box-shadow: 0 10px 30px rgba(255, 0, 120, 0.2);
            z-index: 1;
        }

        .heart-shape::before,
        .heart-shape::after {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            background: #fff0f6;
            border-radius: 50%;
        }

        .heart-shape::before { top: -100px; left: 0; }
        .heart-shape::after { left: 100px; top: 0; }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🖼️ تعديل استايل الصورة */
        .bunny-img {
            width: 120px; /* تقدري تغيري الحجم من هنا */
            height: 120px;
            object-fit: contain; /* عشان الصورة متتمطش */
            cursor: pointer;
            user-select: none;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .love-text {
            margin-top: 15px;
            font-size: 28px;
            color: #ff0077;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .love-text.show {
            opacity: 1;
            transform: scale(1);
        }

        .kiss {
            position: fixed;
            font-size: 35px;
            pointer-events: none;
            z-index: 10;
            animation: kissMove 1.2s ease-out forwards;
        }

        @keyframes kissMove {
            0% { opacity: 1; transform: scale(0.5) translateY(0); }
            100% { opacity: 0; transform: scale(2) translateY(-100px) rotate(20deg); }
        }
    </style>
</head>
<body>

<div class="heart-container">
    <div class="heart-shape"></div>
    <div class="content">
        <img src="blowing-kiss.png" alt="Bunny" class="bunny-img" id="bunny">
        
        <div class="love-text" id="loveText">I Love You 💕</div>
    </div>
</div>

<script>
    const bunny = document.getElementById("bunny");
    const loveText = document.getElementById("loveText");

    bunny.addEventListener("click", function(e) {
        loveText.classList.add("show");

        const kiss = document.createElement("div");
        kiss.className = "kiss";
        kiss.innerText = "💋";
        
        // تحديد مكان البوسة فوق الصورة
        kiss.style.left = (e.clientX - 20) + "px";
        kiss.style.top = (e.clientY - 40) + "px";

        document.body.appendChild(kiss);
        setTimeout(() => kiss.remove(), 1200);
    });
</script>

</body>
</html>
