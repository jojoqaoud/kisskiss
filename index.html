<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-pink: #ffb7b7; --dark-pink: #d63384; --bg-color: #fdf2f2; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { padding: 40px 20px; text-align: center; }
        h1 { font-family: 'Dancing Script', cursive; color: var(--dark-pink); font-size: 3rem; margin: 0; }
        nav { display: flex; gap: 10px; margin-bottom: 30px; z-index: 100; }
        nav button { background: white; border: 2px solid var(--primary-pink); color: var(--dark-pink); padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--dark-pink); color: white; }
        .content-section { display: none; width: 90%; max-width: 600px; text-align: center; animation: fadeIn 0.5s ease; margin-bottom: 50px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .letter-box { background: white; padding: 30px; border-radius: 20px; font-family: 'Lora', serif; font-size: 1.1rem; line-height: 1.7; text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .video-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 5px solid white; }
        video { width: 100%; border-radius: 10px; display: block; }
        footer { padding: 40px; text-align: center; width: 100%; color: var(--dark-pink); font-family: 'Dancing Script', cursive; font-size: 1.5rem; margin-top: auto; }
        .heart-particle { position: fixed; color: #ff4d4d; pointer-events: none; animation: floatUp 2s linear forwards; z-index: 999; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(0); opacity: 0; } }
    </style>
</head>
<body onmousemove="createHeart(event)">

<header>
    <h1>Thinking of You...</h1>
</header>

<nav>
    <button onclick="showSection('letter')" id="btn-letter">The Letter</button>
    <button onclick="showSection('music')" id="id-music">Our Song</button>
    <button onclick="showSection('photos')" id="btn-photos">Our Story</button>
</nav>

<section id="letter" class="content-section">
    <div class="letter-box">
        <h2 style="font-family: 'Dancing Script'; color: var(--dark-pink);">My Love,</h2>
        <p>Write your beautiful letter here...</p>
        <div style="text-align:right;">Forever yours.</div>
    </div>
</section>

<section id="music" class="content-section">
    <div class="video-card">
        <h2 style="font-family: 'Dancing Script'; color: var(--dark-pink);">🎵 Listen to This</h2>
        <audio controls style="width: 100%;"><source src="yoursong.mp3" type="audio/mpeg"></audio>
    </div>
</section>

<section id="photos" class="content-section">
    <div class="video-card">
        <h2 style="font-family: 'Dancing Script'; color: var(--dark-pink);">📽️ Our Story</h2>
        <video controls>
            <source src="ourvideo.mp4" type="video/mp4">
        </video>
    </div>
</section>

<footer>I love you | Mwah 💋</footer>

<script>
    function showSection(id) {
        // نخفي الكل
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        // نظهر اللي عايزينه
        const target = document.getElementById(id);
        if(target) target.style.display = 'block';
        
        // تظبيط شكل الزراير
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        // نلاقي الزرار الصح وننوره
        if(id === 'letter') document.getElementById('btn-letter').classList.add('active');
        if(id === 'music') document.getElementById('id-music').classList.add('active');
        if(id === 'photos') document.getElementById('btn-photos').classList.add('active');
    }

    function createHeart(e) {
        if (Math.random() > 0.1) return; 
        const heart = document.createElement('span');
        heart.innerHTML = '❤️';
        heart.classList.add('heart-particle');
        heart.style.left = e.clientX + 'px';
        heart.style.top = e.clientY + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 2000);
    }
    // نشغل الخطاب أول ما يفتح
    window.onload = () => showSection('letter');
</script>
</body>
</html>
